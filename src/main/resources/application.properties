spring.application.name=geriluh-api

# Configuraþ§es PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/nto_erp_db?currentSchema=nto_erp_db
spring.datasource.username=jou
spring.datasource.password=J9198k25
spring.datasource.driver-class-name=org.postgresql.Driver

# Otimizaþ§es para PostgreSQL
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# Configuraþ§es para PostgreSQL com BYTEA
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Configuraþ§es do Hibernate/JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Flyway
spring.flyway.placeholders.raw_schema=nto_erp_db
spring.flyway.url=${spring.datasource.url}
spring.flyway.user=${spring.datasource.username}
spring.flyway.password=${spring.datasource.password}
spring.flyway.locations=classpath:db/migration

#Console
spring.jpa.show-sql=true

